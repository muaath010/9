<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي حلقات التكرار for - لغة بايثون</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 28px; margin-bottom: 20px; }
        
        /* تصميم التبويبات */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background-color: #ecf0f1; border: 2px solid #bdc3c7; padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #7f8c8d; }
        .tab-btn:hover { background-color: #dfe6e9; }
        .tab-btn.active { background-color: #3498db; color: white; border-color: #2980b9; }
        
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تصميم الكود والمخرجات */
        .code-display { background: #2d3436; color: #a29bfe; padding: 15px; border-radius: 8px; font-size: 22px; direction: ltr; text-align: left; margin: 20px 0; font-family: 'Courier New', Courier, monospace; font-weight: bold;}
        .code-display span.keyword { color: #fdcb6e; }
        .code-display span.string { color: #55efc4; }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin: 20px 0; background: #e8f4f8; padding: 15px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        label { font-weight: bold; margin-bottom: 5px; color: #2d3436; }
        input { width: 70px; padding: 8px; font-size: 16px; text-align: center; border: 2px solid #b2bec3; border-radius: 5px; }
        
        button.run-btn { background-color: #e74c3c; color: white; border: none; padding: 12px 35px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button.run-btn:hover { background-color: #c0392b; transform: translateY(-2px); }

        /* تصميم العناصر المرئية */
        .visual-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px; min-height: 80px; }
        .item-box { padding: 15px 25px; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 10px; font-size: 22px; font-weight: bold; color: #2d3436; transition: 0.4s; }
        .item-box.active { background: #ffeaa7; color: #d35400; border-color: #f1c40f; transform: scale(1.15); box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        
        .number-box { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 50%; font-size: 20px; font-weight: bold; color: #636e72; transition: 0.4s; }
        .number-box.active { background: #00b894; color: white; border-color: #00cec9; transform: scale(1.2); box-shadow: 0 0 15px rgba(0, 184, 148, 0.6); }

        .result-panel { margin-top: 25px; padding: 20px; background: #f1f2f6; border-left: 5px solid #3498db; border-radius: 5px; font-size: 22px; color: #2f3640; text-align: right; min-height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>محاكي التكرار في بايثون (Python For Loops)</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('listTab', this)">أولاً: حلقة for (المرور على قائمة)</button>
        <button class="tab-btn" onclick="switchTab('rangeTab', this)">ثانياً: حلقة for مع (range)</button>
    </div>

    <div id="listTab" class="tab-content active">
        <div class="code-display">
            <span class="keyword">fruits</span> = [<span class="string">"🍎 تفاحة"</span>, <span class="string">"🍌 موزة"</span>, <span class="string">"🍇 عنب"</span>, <span class="string">"🍓 فراولة"</span>]<br>
            <span class="keyword">for</span> item <span class="keyword">in</span> fruits:<br>
            &nbsp;&nbsp;&nbsp;&nbsp;print(item)
        </div>
        <button class="run-btn" onclick="visualizeList()">شغّل الكود (Run)</button>
        
        <div class="visual-container" id="listContainer">
            <div class="item-box" id="item-0">🍎 تفاحة</div>
            <div class="item-box" id="item-1">🍌 موزة</div>
            <div class="item-box" id="item-2">🍇 عنب</div>
            <div class="item-box" id="item-3">🍓 فراولة</div>
        </div>
        
        <div class="result-panel">
            <strong>شاشة المخرجات: </strong> <span id="listOutput"></span>
        </div>
    </div>

    <div id="rangeTab" class="tab-content">
        <div class="controls">
            <div class="input-group">
                <label>البداية (Start)</label>
                <input type="number" id="startVal" value="1">
            </div>
            <div class="input-group">
                <label>النهاية (End)</label>
                <input type="number" id="endVal" value="10">
            </div>
            <div class="input-group">
                <label>القفزة (Step)</label>
                <input type="number" id="stepVal" value="2">
            </div>
        </div>

        <div class="code-display" id="rangeCodeText">
            <span class="keyword">for</span> i <span class="keyword">in</span> range(1, 10, 2):<br>
            &nbsp;&nbsp;&nbsp;&nbsp;print(i)
        </div>
        <button class="run-btn" onclick="visualizeRange()">شغّل الكود (Run)</button>
        
        <div class="visual-container" id="numberLine">
            </div>
        
        <div class="result-panel">
            <strong>شاشة المخرجات: </strong> <span id="rangeOutput"></span>
        </div>
    </div>
</div>

<script>
    // نظام التبويبات
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // دالة محاكاة القوائم (التبويب الأول)
    async function visualizeList() {
        const items = ["🍎 تفاحة", "🍌 موزة", "🍇 عنب", "🍓 فراولة"];
        document.getElementById('listOutput').innerText = "";
        
        // إعادة تعيين الألوان
        for(let i=0; i<4; i++) { document.getElementById('item-'+i).classList.remove('active'); }

        let outputText = "";
        for (let i = 0; i < items.length; i++) {
            await new Promise(r => setTimeout(r, 800)); // تأخير ليرى الطالب الخطوة
            document.getElementById('item-' + i).classList.add('active');
            outputText += items[i] + "  |  ";
            document.getElementById('listOutput').innerText = outputText;
        }
    }

    // دالة محاكاة Range (التبويب الثاني)
    function initNumberLine() {
        const container = document.getElementById('numberLine');
        container.innerHTML = '';
        for(let i = 0; i <= 15; i++) {
            let div = document.createElement('div');
            div.className = 'number-box';
            div.id = 'num-' + i;
            div.innerText = i;
            container.appendChild(div);
        }
    }

    async function visualizeRange() {
        const start = parseInt(document.getElementById('startVal').value);
        const end = parseInt(document.getElementById('endVal').value);
        const step = parseInt(document.getElementById('stepVal').value);
        
        // تحديث النص البرمجي
        let codeStr = `<span class="keyword">for</span> i <span class="keyword">in</span> range(${start}, ${end}`;
        if(step !== 1) codeStr += `, ${step}`;
        codeStr += `):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(i)`;
        document.getElementById('rangeCodeText').innerHTML = codeStr;

        // إعادة تعيين الشاشة
        document.querySelectorAll('.number-box').forEach(box => box.classList.remove('active'));
        document.getElementById('rangeOutput').innerText = '';

        if(step === 0) { alert("قيمة القفزة لا يمكن أن تكون صفراً!"); return; }

        let outputArray = [];
        
        if (step > 0) {
            for(let i = start; i < end; i += step) {
                if(i >= 0 && i <= 15) { await highlightNumber(i); }
                outputArray.push(i);
                document.getElementById('rangeOutput').innerText = outputArray.join(' ، ');
            }
        } else {
             for(let i = start; i > end; i += step) {
                if(i >= 0 && i <= 15) { await highlightNumber(i); }
                outputArray.push(i);
                document.getElementById('rangeOutput').innerText = outputArray.join(' ، ');
            }
        }
    }

    function highlightNumber(index) {
        return new Promise(resolve => {
            setTimeout(() => {
                const box = document.getElementById('num-' + index);
                if(box) box.classList.add('active');
                resolve();
            }, 600);
        });
    }

    // تهيئة الأرقام عند التحميل
    window.onload = initNumberLine;
</script>

</body>
</html>
