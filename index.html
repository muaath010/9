<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي دالة range() - لغة بايثون</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin: 20px 0; background: #e8f4f8; padding: 20px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        label { font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input { width: 80px; padding: 10px; font-size: 18px; text-align: center; border: 2px solid #bdc3c7; border-radius: 5px; }
        button { background-color: #e74c3c; color: white; border: none; padding: 10px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #c0392b; transform: scale(1.05); }
        .code-display { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-size: 24px; direction: ltr; text-align: left; margin: 20px 0; font-family: 'Courier New', Courier, monospace; }
        .number-line { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        .number-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 50%; font-size: 20px; font-weight: bold; color: #7f8c8d; transition: 0.4s; }
        .number-box.active { background: #f1c40f; color: #fff; border-color: #f39c12; transform: scale(1.2); box-shadow: 0 0 15px rgba(241, 196, 15, 0.6); }
        .result-panel { margin-top: 30px; padding: 20px; background: #dff9fb; border-radius: 10px; font-size: 20px; color: #130f40; min-height: 50px;}
    </style>
</head>
<body>

<div class="container">
    <h1>محاكي حلقة التكرار (for) ودالة النطاق (range)</h1>
    
    <div class="controls">
        <div class="input-group">
            <label>البداية (Start)</label>
            <input type="number" id="startVal" value="0">
        </div>
        <div class="input-group">
            <label>النهاية (End)</label>
            <input type="number" id="endVal" value="10">
        </div>
        <div class="input-group">
            <label>القفزة (Step)</label>
            <input type="number" id="stepVal" value="1">
        </div>
    </div>

    <div class="code-display" id="codeText">
        for i in range(0, 10, 1):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(i)
    </div>

    <button onclick="visualizeRange()">شغّل الكود (Run)</button>

    <div class="number-line" id="numberLine">
        </div>

    <div class="result-panel">
        <strong>المخرجات (Output): </strong> <span id="outputResult">...</span>
    </div>
</div>

<script>
    // إنشاء خط الأعداد المبدئي
    function initNumberLine() {
        const container = document.getElementById('numberLine');
        container.innerHTML = '';
        for(let i = 0; i <= 20; i++) {
            let div = document.createElement('div');
            div.className = 'number-box';
            div.id = 'box-' + i;
            div.innerText = i;
            container.appendChild(div);
        }
    }

    async function visualizeRange() {
        const start = parseInt(document.getElementById('startVal').value);
        const end = parseInt(document.getElementById('endVal').value);
        const step = parseInt(document.getElementById('stepVal').value);
        
        // تحديث شكل الكود
        let codeStr = `for i in range(${start}, ${end}`;
        if(step !== 1) codeStr += `, ${step}`;
        codeStr += `):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(i)`;
        document.getElementById('codeText').innerHTML = codeStr;

        // إعادة تعيين الألوان والمخرجات
        const boxes = document.querySelectorAll('.number-box');
        boxes.forEach(box => box.classList.remove('active'));
        document.getElementById('outputResult').innerText = '';

        if(step === 0) {
            alert("لا يمكن أن تكون القفزة صفراً!");
            return;
        }

        let outputArray = [];
        
        // المنطق الرياضي لمحاكاة البايثون
        if (step > 0) {
            for(let i = start; i < end; i += step) {
                if(i >= 0 && i <= 20) {
                    await highlightBox(i);
                }
                outputArray.push(i);
                document.getElementById('outputResult').innerText = outputArray.join(' ، ');
            }
        } else {
             for(let i = start; i > end; i += step) {
                if(i >= 0 && i <= 20) {
                    await highlightBox(i);
                }
                outputArray.push(i);
                document.getElementById('outputResult').innerText = outputArray.join(' ، ');
            }
        }
    }

    function highlightBox(index) {
        return new Promise(resolve => {
            setTimeout(() => {
                const box = document.getElementById('box-' + index);
                if(box) box.classList.add('active');
                resolve();
            }, 600); // سرعة القفز (600 ملي ثانية)
        });
    }

    // تهيئة عند فتح الصفحة
    initNumberLine();
</script>

</body>
</html>
