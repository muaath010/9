<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي بايثون - المهندس الزراعي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #cccccc; margin: 0; padding: 20px; }
        .ide-container { max-width: 1000px; margin: 0 auto; background: #252526; border: 1px solid #333333; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ide-header { background: #333333; padding: 10px 20px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; color: #999999; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; } .dot.yellow { background: #ffbd2e; } .dot.green { background: #27c93f; }

        .tabs { background: #2d2d2d; display: flex; border-bottom: 1px solid #444; }
        .tab-btn { background: none; border: none; color: #858585; padding: 12px 20px; font-size: 15px; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold;}
        .tab-btn.active { color: #ffffff; border-bottom: 2px solid #27ae60; background: #1e1e1e; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        .workspace { display: flex; gap: 20px; }
        .code-window { width: 60%; background: #1e1e1e; padding: 15px; font-family: 'Consolas', monospace; font-size: 20px; direction: ltr; text-align: left; line-height: 1.6; border: 1px solid #333; border-radius: 6px; }
        .keyword { color: #569cd6; font-weight: bold; }
        .function { color: #dcdcaa; }
        .variable { color: #9cdcfe; }
        .string { color: #ce9178; }
        .number { color: #b5cea8; }

        .controls { width: 40%; background: #2d2d2d; padding: 15px; border-radius: 6px; border-right: 4px solid #27ae60; }
        .controls h3 { margin-top: 0; color: #fff; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 13px; color: #ccc; margin-bottom: 4px; }
        input { width: 100%; background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 16px; text-align: center;}
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; transition: 0.2s;}
        button:hover { background: #2ecc71; }

        .visual-area { margin-top: 20px; min-height: 60px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; direction: ltr;}
        .item-box { padding: 10px 15px; background: #2d2d2d; border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 18px; color: #ccc; transition: 0.3s; }
        .item-box.active { background: #27ae60; color: white; border-color: #2ecc71; transform: scale(1.1); box-shadow: 0 0 10px rgba(39, 174, 96, 0.6); }

        .terminal-area { background: #1e1e1e; padding: 15px; font-family: 'Consolas', monospace; font-size: 16px; height: 130px; overflow-y: auto; direction: ltr; text-align: left; border-top: 1px solid #333; }
        .prompt { color: #27c93f; }
    </style>
</head>
<body>

<div class="ide-container">
    <div class="ide-header">
        <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
        <div>omani_palms.py - Python IDE</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab1', this)">1. حلقة for (أنواع النخيل)</button>
        <button class="tab-btn" onclick="switchTab('tab2', this)">2. دالة range (مسافات الزراعة)</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="workspace">
            <div class="code-window">
                <span class="variable">palm_types</span> = [<span class="string">"خلاص 🌴"</span>, <span class="string">"خنيزي 🌴"</span>, <span class="string">"فرض 🌴"</span>, <span class="string">"مجهول 🌴"</span>]<br>
                <span class="keyword">for</span> <span class="variable">tree</span> <span class="keyword">in</span> <span class="variable">palm_types</span>:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="function">print</span>(<span class="variable">tree</span>)
            </div>
            <div class="controls">
                <h3>أصناف النخيل العمانية</h3>
                <button onclick="runPalms()">▶ تشغيل البرنامج</button>
            </div>
        </div>
        <div class="visual-area" id="palmsVisual">
            <div class="item-box" id="p-0">خلاص 🌴</div><div class="item-box" id="p-1">خنيزي 🌴</div>
            <div class="item-box" id="p-2">فرض 🌴</div><div class="item-box" id="p-3">مجهول 🌴</div>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="workspace">
            <div class="code-window">
                <span class="keyword">for</span> <span class="variable">meter</span> <span class="keyword">in</span> <span class="function">range</span>(<span class="number" id="c-start">0</span>, <span class="number" id="c-end">50</span>, <span class="number" id="c-step">5</span>):<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<span class="function">print</span>(<span class="string">"نخلة عند المتر:"</span>, <span class="variable">meter</span>)
            </div>
            <div class="controls">
                <h3>مصحح مسافات الزراعة</h3>
                <div class="input-group"><label>نقطة البداية (Start)</label><input type="number" id="startVal" value="0"></div>
                <div class="input-group"><label>نقطة النهاية (End)</label><input type="number" id="endVal" value="50"></div>
                <div class="input-group"><label>مسافة القفزة/الزراعة (Step)</label><input type="number" id="stepVal" value="5"></div>
                <button onclick="runRange()">▶ توزيع الأشجار</button>
            </div>
        </div>
        <div class="visual-area" id="rangeVisual"></div>
    </div>

    <div class="terminal-area" id="terminalOutput">
        <span class="prompt">PS C:\Oman\Agriculture></span> <br>
    </div>
</div>

<script>
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    async function runPalms() {
        const terminal = document.getElementById('terminalOutput');
        terminal.innerHTML = '<span class="prompt">PS C:\\Oman\\Agriculture></span> python palms.py<br>';
        const items = ["خلاص 🌴", "خنيزي 🌴", "فرض 🌴", "مجهول 🌴"];
        for(let i=0; i<4; i++) document.getElementById('p-'+i).classList.remove('active');
        for(let i=0; i<items.length; i++) {
            document.getElementById('p-'+i).classList.add('active');
            terminal.innerHTML += items[i] + "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            await new Promise(r => setTimeout(r, 1000));
            document.getElementById('p-'+i).classList.remove('active');
        }
        terminal.innerHTML += '<span class="prompt">PS C:\\Oman\\Agriculture></span> <br>';
    }

    function initRange() {
        const c = document.getElementById('rangeVisual');
        c.innerHTML = '';
        for(let i=0; i<=50; i+=5) {
            let d = document.createElement('div');
            d.className = 'item-box'; d.id = 'r-'+i; d.innerText = i + 'm';
            c.appendChild(d);
        }
    }

    async function runRange() {
        const start = parseInt(document.getElementById('startVal').value);
        const end = parseInt(document.getElementById('endVal').value);
        const step = parseInt(document.getElementById('stepVal').value);
        
        document.getElementById('c-start').innerText = start;
        document.getElementById('c-end').innerText = end;
        document.getElementById('c-step').innerText = step;

        const terminal = document.getElementById('terminalOutput');
        terminal.innerHTML = '<span class="prompt">PS C:\\Oman\\Agriculture></span> python plant_trees.py<br>';
        document.querySelectorAll('#rangeVisual .item-box').forEach(b => b.classList.remove('active'));

        if(step > 0) {
            for(let i=start; i<end; i+=step) {
                if(i>=0 && i<=50 && i%5===0) {
                    const box = document.getElementById('r-'+i);
                    if(box) box.classList.add('active');
                }
                terminal.innerHTML += "زراعة نخلة 🌴 عند المتر: " + i + "<br>";
                terminal.scrollTop = terminal.scrollHeight;
                await new Promise(r => setTimeout(r, 800));
            }
        }
        terminal.innerHTML += '<span class="prompt">PS C:\\Oman\\Agriculture></span> <br>';
    }
    window.onload = initRange;
</script>
</body>
</html>
